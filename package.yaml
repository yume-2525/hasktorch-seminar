name:                my-hasktorch-task
version:             0.1.0.0
github:              "githubuser/my-hasktorch-task"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/my-hasktorch-task#readme>

dependencies:
- base >= 4.7 && < 5
- hasktorch 
- hasktorch-tools

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  my-hasktorch-task-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - my-hasktorch-task
    
  session3-linear-regression:
    main:                LinearRegression.hs
    source-dirs:         Session3
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - my-hasktorch-task
    - nlp-tools

  session-3-graduate-admission-linear:
    main:                GraduateAdmissionLinear.hs
    source-dirs:         Session3
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - my-hasktorch-task
    - nlp-tools
    - cassava 
    - bytestring    
    - vector

  session-4-perceptron-and-gate:
    main:                PerceptronAndGate.hs
    source-dirs:         Session4
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - my-hasktorch-task

tests:
  my-hasktorch-task-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - my-hasktorch-task
